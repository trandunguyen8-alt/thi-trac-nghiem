<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thi thử 50 câu | 60 phút</title>
  <script src="https://cdn.jsdelivr.net/npm/mammoth/mammoth.browser.min.js"></script>
  <style>
    body{font-family:Arial,sans-serif;margin:20px;background:#f7f8fa;color:#222}
    .wrap{max-width:1000px;margin:auto;background:#fff;padding:20px;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08)}
    h2{margin-top:0}
    .btn{background:#111;color:#fff;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;margin-right:8px}
    .btn:disabled{background:#999;cursor:not-allowed}
    .question{border:1px solid #ddd;border-radius:10px;padding:12px;margin:12px 0;background:#fff}
    .timer{color:red;font-weight:bold;font-size:20px;margin:10px 0}
    .ok{color:green;font-weight:bold}
    .bad{color:red;font-weight:bold}
    .muted{color:#666;font-size:14px}
    #status{margin:12px 0;font-weight:bold;white-space:pre-line}
    #debug{background:#f5f5f5;border:1px solid #ddd;padding:10px;border-radius:8px;font-size:13px;white-space:pre-wrap}
  </style>
</head>
<body>
  <div class="wrap">
    <h2>📄 Upload file Word để thi</h2>
    <p class="muted">
      Chỉ hỗ trợ file <b>.docx chuẩn</b>. File phải có dạng <b>Câu 1:</b> ... và đáp án đúng có dấu <b>*</b> trước A/B/C/D, ví dụ <b>*A.</b>
    </p>

    <input type="file" id="fileInput" accept=".docx" />
    <button class="btn" id="btnLoad">Nạp đề</button>

    <div id="status">Chưa nạp đề.</div>
    <details>
      <summary><b>🔍 Debug</b></summary>
      <div id="debug">Chưa có dữ liệu.</div>
    </details>

    <hr />

    <div class="timer">⏱️ <span id="time">60:00</span></div>

    <button class="btn" id="btnStart" disabled>Bắt đầu</button>
    <button class="btn" id="btnSubmit" disabled>Nộp bài</button>

    <div id="quiz"></div>

    <h3 id="result"></h3>
    <div id="review"></div>
  </div>

  <script>
    let BANK = [];
    let questions = [];
    let time = 3600;
    let timer = null;

    const fileInput = document.getElementById("fileInput");
    const btnLoad = document.getElementById("btnLoad");
    const btnStart = document.getElementById("btnStart");
    const btnSubmit = document.getElementById("btnSubmit");
    const statusDiv = document.getElementById("status");
    const debugDiv = document.getElementById("debug");
    const quizDiv = document.getElementById("quiz");
    const resultDiv = document.getElementById("result");
    const reviewDiv = document.getElementById("review");
    const timeDiv = document.getElementById("time");

    function shuffle(arr){
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]] = [a[j],a[i]];
      }
      return a;
    }

    function formatTime(sec){
      const m = Math.floor(sec/60);
      const s = sec%60;
      return `${m}:${s<10?"0"+s:s}`;
    }

    function decodeHtmlEntities(str){
      const txt = document.createElement("textarea");
      txt.innerHTML = str;
      return txt.value;
    }

    function parseQuestions(text){
      text = decodeHtmlEntities(text).replace(/\r/g,"");

      const reSplit = /(?:^|\n)\s*(?:Câu|CÂU|câu)\s*(\d+)\s*[:.]\s*/g;
      let match, lastIndex = 0;
      let items = [];
      let currNo = null;

      while((match = reSplit.exec(text)) !== null){
        const start = match.index;
        const no = parseInt(match[1],10);

        if(currNo !== null){
          items.push({ no: currNo, block: text.slice(lastIndex, start) });
        }
        currNo = no;
        lastIndex = reSplit.lastIndex;
      }

      if(currNo !== null){
        items.push({ no: currNo, block: text.slice(lastIndex) });
      }

      function cleanLine(s){
        return (s || "").replace(/\n+/g," ").replace(/\s+/g," ").trim();
      }

      function extractOption(block, letter){
        const re = new RegExp(
          String.raw`(?:^|\n)\s*(\*)?\s*${letter}\s*\.\s*([\s\S]*?)(?=(?:\n\s*(?:\*)?\s*[A-D]\s*\.)|$ )`,
          "i"
        );
        const m = re.exec(block);
        if(!m) return null;
        return {
          isAnswer: !!m[1],
          text: cleanLine(m[2])
        };
      }

      const bank = [];
      let missingAnswer = 0;

      for(const it of items){
        const block = (it.block || "").trim();
        if(!block) continue;

        const idxA = block.search(/(?:^|\n)\s*(\*)?\s*A\s*\./i);
        let qText = idxA >= 0 ? block.slice(0, idxA) : block;
        qText = cleanLine(qText);

        const opts = ["A","B","C","D"].map(L => extractOption(block, L));
        if(opts.some(x => x === null)) continue;

        let answerIndex = opts.findIndex(o => o.isAnswer);
        if(answerIndex < 0){
          missingAnswer++;
          answerIndex = -1;
        }

        bank.push({
          id: it.no,
          q: qText,
          options: opts.map(o => o.text),
          answer: answerIndex
        });
      }

      return { bank, missingAnswer };
    }

    function renderQuiz(){
      quizDiv.innerHTML = "";
      questions.forEach((q, i) => {
        const div = document.createElement("div");
        div.className = "question";
        div.innerHTML = `
          <b>Câu ${i+1}:</b> ${q.q}<br><br>
          ${q.options.map((opt,j)=>`
            <label>
              <input type="radio" name="q${i}" value="${j}">
              <b>${String.fromCharCode(65+j)}.</b> ${opt}
            </label><br>
          `).join("")}
        `;
        quizDiv.appendChild(div);
      });
    }

    function startTimer(){
      time = 3600;
      timeDiv.textContent = formatTime(time);
      clearInterval(timer);
      timer = setInterval(() => {
        time--;
        timeDiv.textContent = formatTime(time);
        if(time <= 0){
          clearInterval(timer);
          submitQuiz();
        }
      }, 1000);
    }

    function submitQuiz(){
      clearInterval(timer);

      let correct = 0;
      let reviewHtml = "";

      questions.forEach((q, i) => {
        const selected = document.querySelector(`input[name="q${i}"]:checked`);
        const user = selected ? parseInt(selected.value) : -1;
        const isCorrect = user === q.answer;
        if(isCorrect) correct++;

        reviewHtml += `
          <div class="question">
            <b>Câu ${i+1}:</b> ${q.q}<br>
            <div class="${isCorrect ? "ok":"bad"}">${isCorrect ? "ĐÚNG" : "SAI"}</div>
            <div><b>Đáp án đúng:</b> ${q.answer >= 0 ? String.fromCharCode(65+q.answer)+". "+q.options[q.answer] : "Không xác định"}</div>
            <div><b>Bạn chọn:</b> ${user >= 0 ? String.fromCharCode(65+user)+". "+q.options[user] : "Không chọn"}</div>
          </div>
        `;
      });

      resultDiv.innerHTML = `✅ Bạn đúng <b>${correct}/${questions.length}</b> câu`;
      reviewDiv.innerHTML = reviewHtml;
      btnSubmit.disabled = true;
    }

    btnLoad.addEventListener("click", () => {
      const file = fileInput.files[0];

      if(!file){
        alert("Bạn chưa chọn file.");
        return;
      }

      statusDiv.textContent = "⏳ Đang đọc file...";
      debugDiv.textContent = `Tên file: ${file.name}\nDung lượng: ${file.size} bytes`;

      if(!file.name.toLowerCase().endsWith(".docx")){
        statusDiv.textContent = "❌ Chỉ hỗ trợ file .docx";
        return;
      }

      const reader = new FileReader();

      reader.noscript = function(e){
        mammoth.extractRawText({ arrayBuffer: e.target.result })
          .then(result => {
            const rawText = result.value || "";
            const parsed = parseQuestions(rawText);
            BANK = parsed.bank;

            debugDiv.textContent =
              `Tên file: ${file.name}\n` +
              `Ký tự đọc được: ${rawText.length}\n` +
              `Parse được: ${BANK.length} câu\n` +
              `Thiếu đáp án *: ${parsed.missingAnswer}\n\n` +
              `300 ký tự đầu:\n${rawText.slice(0,300)}`;

            if(rawText.trim().length === 0){
              statusDiv.textContent = "❌ File đọc ra rỗng. Khả năng cao file .docx không chuẩn.";
              btnStart.disabled = true;
              return;
            }

            if(BANK.length === 0){
              statusDiv.textContent = "❌ Không parse được câu hỏi. File không đúng format Câu/A/B/C/D/*.";
              btnStart.disabled = true;
              return;
            }

            statusDiv.innerHTML = `✅ Đã nạp thành công <b>${BANK.length}</b> câu`;
            btnStart.disabled = false;
            btnSubmit.disabled = true;
            resultDiv.innerHTML = "";
            reviewDiv.innerHTML = "";
            quizDiv.innerHTML = "";
          })
          .catch(err => {
            console.error(err);
            statusDiv.textContent = "❌ Lỗi đọc file Word.";
            debugDiv.textContent = String(err);
            btnStart.disabled = true;
          });
      };

      reader.noscript = function(){
        statusDiv.textContent = "❌ Không thể đọc file.";
      };

      reader.readAsArrayBuffer(file);
    });

    btnStart.addEventListener("click", () => {
      if(BANK.length === 0){
        alert("Chưa có ngân hàng câu hỏi.");
        return;
      }

      questions = shuffle(BANK).slice(0, Math.min(50, BANK.length));
      renderQuiz();
      startTimer();
      btnSubmit.disabled = false;
      btnStart.disabled = true;
      resultDiv.innerHTML = "";
      reviewDiv.innerHTML = "";
    });

    btnSubmit.addEventListener("click", () => {
      submitQuiz();
    });
  </script>
</body>
</html>
