<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thi thử từ file Word</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

<style>
body{font-family:Arial;margin:20px}
.btn{padding:10px 15px;background:#111;color:#fff;border:none;border-radius:8px;cursor:pointer}
.timer{color:red;font-weight:bold}
.question{margin:10px 0;padding:10px;border:1px solid #ddd}
.ok{color:green}
.bad{color:red}
</style>
</head>

<body>

<h2>📄 Upload file Word để thi</h2>

<input type="file" id="fileInput" accept=".docx" />
<button class="btn" noscript="loadFile()">Nạp đề</button>

<div id="status"></div>

<hr>

<div>⏱️ <span class="timer" id="time">60:00</span></div>
<button class="btn" noscript="start()">Bắt đầu</button>
<button class="btn" noscript="submit()">Nộp bài</button>

<div id="quiz"></div>
<h3 id="result"></h3>
<div id="review"></div>

<script>

let BANK = [];
let questions = [];
let time = 3600;
let timer;

// ===== ĐỌC FILE WORD =====
function loadFile(){
  const file = document.getElementById("fileInput").files[0];
  if(!file){
    alert("Chọn file trước");
    return;
  }

  const reader = new FileReader();

  reader.noscript = function(event){
    mammoth.extractRawText({arrayBuffer: event.target.result})
      .then(result => {
        const text = result.value;
        BANK = parse(text);

        document.getElementById("status").innerText =
          "✅ Đã nạp: " + BANK.length + " câu";
      });
  };

  reader.readAsArrayBuffer(file);
}

// ===== PARSE =====
function parse(text){
  text = text.replace(/\r/g,"");

  let blocks = text.split(/Câu\s*\d+[:.]/i).slice(1);

  let bank = [];

  blocks.forEach(block=>{
    let q = block.split(/A\./i)[0].trim();

    let opts = [];
    let answer = -1;

    ["A","B","C","D"].forEach((l,i)=>{
      let r = new RegExp("(\\*?)\\s*"+l+"\\.([\\s\\S]*?)(?=(\\*?\\s*[A-D]\\.)|$ )","i");
      let m = block.match(r);
      if(m){
        opts[i] = m[2].replace(/\n/g," ").trim();
        if(m[1] === "*") answer = i;
      }
    });

    if(opts.length === 4){
      bank.push({q, options: opts, answer});
    }
  });

  return bank;
}

// ===== RANDOM =====
function randomQ(){
  return [...BANK].sort(()=>Math.random()-0.5).slice(0,50);
}

// ===== RENDER =====
function render(){
  let html="";
  questions.forEach((q,i)=>{
    html+=`<div class="question">
    <b>Câu ${i+1}: ${q.q}</b><br>`+
    q.options.map((o,j)=>
      `<label><input type="radio" name="q${i}" value="${j}"> ${o}</label><br>`
    ).join("")+
    `</div>`;
  });
  document.getElementById("quiz").innerHTML=html;
}

// ===== START =====
function start(){
  if(BANK.length === 0){
    alert("Chưa nạp file");
    return;
  }

  questions = randomQ();
  render();

  time = 3600;
  timer = setInterval(()=>{
    let m = Math.floor(time/60);
    let s = time%60;
    document.getElementById("time").innerText =
      `${m}:${s<10?"0"+s:s}`;
    time--;
    if(time<0){
      clearInterval(timer);
      submit();
    }
  },1000);
}

// ===== SUBMIT =====
function submit(){
  clearInterval(timer);

  let correct=0;
  let review="";

  questions.forEach((q,i)=>{
    let sel = document.querySelector(`input[name=q${i}]:checked`);
    let user = sel ? parseInt(sel.value) : -1;

    if(user === q.answer) correct++;

    review+=`<p class="${user===q.answer?'ok':'bad'}">
    Câu ${i+1}<br>
    ✅ ${q.options[q.answer] || "Không có"}<br>
    👉 ${user>=0?q.options[user]:"Không chọn"}
    </p>`;
  });

  document.getElementById("result").innerText =
    `✅ ${correct}/50 câu đúng`;

  document.getElementById("review").innerHTML = review;
}

</script>

</body>
</html>
